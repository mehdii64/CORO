services:
  - type: web
    name: coro-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: coro-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/coro.db
      - key: ALLOWED_ORIGINS
        value: https://frontend-nine-eta-57.vercel.app
